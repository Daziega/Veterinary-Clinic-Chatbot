<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENAE25 Veterinary Clinic</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <span class="header-icon">🐾</span>
        <div>
          <h1>ENAE25 Veterinary Clinic</h1>
          <p class="header-subtitle">Sterilisation &amp; Preventive Care Assistant</p>
        </div>
      </div>
    </header>

    <main class="chat-container" id="chatContainer">
      <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
          <div class="message-bubble">
            Hello! I'm the veterinary clinic assistant. I can help you with information about
            sterilisation procedures, pre-surgery preparation, and appointment scheduling.
            How can I help you today?
          </div>
        </div>
      </div>
    </main>

    <footer class="input-area">
      <form class="input-form" id="chatForm" onsubmit="return false;">
        <input
          type="text"
          id="messageInput"
          class="message-input"
          placeholder="Type your message..."
          autocomplete="off"
          autofocus
        >
        <button type="submit" class="send-btn" id="sendBtn" title="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
